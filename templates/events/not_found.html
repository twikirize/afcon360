{% extends "base.html" %}

{% block title %}Event Not Found - AFCON360{% endblock %}

{% block content %}
<div class="container py-5 text-center">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm">
                <div class="card-body py-5">
                    <i class="fas fa-calendar-times fa-4x text-muted mb-3"></i>
                    <h2>Event Not Found</h2>
                    <p class="lead">Sorry, we couldn't find the event "{{ event_slug }}"</p>
                    <p>Check the event URL or browse our <a href="{{ url_for('accommodation.accommodation_guest.search') }}">accommodation listings</a>.</p>
                    <div class="mt-4">
                        <!-- FIXED: Changed from accommodation.accommodation_event.list to events.list -->
                        <a href="{{ url_for('events.list') }}" class="btn btn-primary">
                            Browse All Events
                        </a>
                        <!-- CORRECT: This stays pointing to accommodation search -->
                        <a href="{{ url_for('accommodation.accommodation_guest.search') }}" class="btn btn-outline-secondary ms-2">
                            Browse Properties
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
