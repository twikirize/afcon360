{% extends "base.html" %}
{% block content %}
<section class="max-w-2xl mx-auto p-4 space-y-6">
  <h2 class="text-2xl font-bold mb-4">Send Funds</h2>
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for category, message in messages %}
        <div class="bg-yellow-100 border-l-4 border-yellow-500 text-yellow-700 p-4">{{ message }}</div>
      {% endfor %}
    {% endif %}
  {% endwith %}
  <form method="POST" action="{{ url_for('wallet.send_funds') }}" class="space-y-4">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div><label class="block font-semibold mb-1">Receiver ID</label><input type="text" name="receiver_id" class="w-full border rounded px-3 py-2" required></div>
    <div><label class="block font-semibold mb-1">Amount</label><input type="number" step="0.01" name="amount" class="w-full border rounded px-3 py-2" required></div>
    <div><label class="block font-semibold mb-1">Currency</label><select name="currency" class="w-full border rounded px-3 py-2">
      <option value="USD">USD</option><option value="UGX">UGX</option><option value="KES">KES</option><option value="TZS">TZS</option><option value="NGN">NGN</option>
    </select></div>
    <div><label class="block font-semibold mb-1">Agent Fee (optional)</label><input type="number" step="0.01" name="agent_fee" class="w-full border rounded px-3 py-2"></div>
    <div><button type="submit" class="bg-yellow-600 text-white px-4 py-2 rounded hover:bg-yellow-700 w-full">Send Funds</button></div>
  </form>
</section>
{% endblock %}
