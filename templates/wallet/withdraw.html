{% extends "base.html" %}
{% block content %}
<section class="max-w-2xl mx-auto p-4 space-y-6">
  <h2 class="text-2xl font-bold mb-4">Withdraw Funds</h2>
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for category, message in messages %}
        <div class="bg-red-100 border-l-4 border-red-500 text-red-700 p-4">{{ message }}</div>
      {% endfor %}
    {% endif %}
  {% endwith %}
  <form method="POST" action="{{ url_for('wallet_routes.withdraw_funds') }}" class="space-y-4">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div><label class="block font-semibold mb-1">Amount</label><input type="number" step="0.01" name="amount" class="w-full border rounded px-3 py-2" required></div>
    <div><label class="block font-semibold mb-1">Currency</label><select name="currency" class="w-full border rounded px-3 py-2">
      <option value="USD">USD</option><option value="UGX">UGX</option><option value="KES">KES</option><option value="TZS">TZS</option><option value="NGN">NGN</option>
    </select></div>
    <div><label class="block font-semibold mb-1">Method</label><select name="method" class="w-full border rounded px-3 py-2">
      <option value="ATM">ATM</option><option value="Agent">Agent</option>
    </select></div>
    <div><label class="block font-semibold mb-1">Agent ID (optional)</label><input type="text" name="agent_id" class="w-full border rounded px-3 py-2"></div>
    <div><button type="submit" class="bg-red-600 text-white px-4 py-2 rounded hover:bg-red-700 w-full">Withdraw</button></div>
  </form>
</section>
{% endblock %}
