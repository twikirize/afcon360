{% extends "base.html" %}

{% block title %}Edit Event - AFCON360 Accommodation{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm">
                <div class="card-header bg-white">
                    <h4 class="mb-0">Edit Event: {{ event.name }}</h4>
                </div>
                <div class="card-body">
                    <form method="POST" id="event-form">
                        <div class="mb-3">
                            <label class="form-label">Event Name *</label>
                            <input type="text" name="name" class="form-control" value="{{ event.name }}" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Description</label>
                            <textarea name="description" class="form-control" rows="4">{{ event.description }}</textarea>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">City *</label>
                                <input type="text" name="city" class="form-control" value="{{ event.city }}" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Venue</label>
                                <input type="text" name="venue" class="form-control" value="{{ event.venue }}">
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Start Date</label>
                                <input type="date" name="start_date" class="form-control" value="{{ event.start_date }}">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">End Date</label>
                                <input type="date" name="end_date" class="form-control" value="{{ event.end_date }}">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Website</label>
                            <input type="url" name="website" class="form-control" value="{{ event.metadata.website }}">
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Contact Email</label>
                                <input type="email" name="contact_email" class="form-control" value="{{ event.metadata.contact_email }}">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Contact Phone</label>
                                <input type="tel" name="contact_phone" class="form-control" value="{{ event.metadata.contact_phone }}">
                            </div>
                        </div>

                        <div class="alert alert-info small">
                            <i class="fas fa-info-circle"></i> 
                            Event status: <strong>{{ event.status|upper }}</strong>
                            {% if event.status == 'pending' %} - Your event is awaiting review.{% endif %}
                        </div>

                        <div class="d-flex justify-content-between">
                            <a href="{{ url_for('accommodation.accommodation_event.my_events') }}" class="btn btn-secondary">Cancel</a>
                            <button type="submit" class="btn btn-primary">Save Changes</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
document.getElementById('event-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    
    const formData = new FormData(this);
    const data = Object.fromEntries(formData.entries());
    
    const response = await fetch(window.location.href, {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
        },
        body: JSON.stringify(data)
    });
    
    const result = await response.json();
    
    if (result.success) {
        window.location.href = result.redirect;
    } else {
        alert('Error: ' + result.error);
    }
});
</script>
{% endblock %}
