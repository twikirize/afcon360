<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Admin Payouts</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container py-4">
  <h2>Payout Requests</h2>
  <table class="table table-bordered">
    <thead><tr><th>ID</th><th>Agent</th><th>Amount</th><th>Method</th><th>Status</th><th>Requested At</th><th>Actions</th></tr></thead>
    <tbody>
      {% for r in requests %}
      <tr>
        <td>{{ r.id }}</td>
        <td>{{ r.agent_id }}</td>
        <td>{{ r.amount }}</td>
        <td>{{ r.method }}</td>
        <td>{{ r.status }}</td>
        <td>{{ r.requested_at }}</td>
        <td>
          <form method="POST" action="{{ url_for('wallet_routes.admin_process_payout', req_id=r.id) }}">
            <button name="action" value="approve" class="btn btn-sm btn-success">Approve</button>
            <button name="action" value="reject" class="btn btn-sm btn-danger">Reject</button>
            <button name="action" value="mark_paid" class="btn btn-sm btn-primary">Mark Paid</button>
            <input type="text" name="notes" placeholder="notes" class="form-control form-control-sm mt-1">
          </form>
        </td>
      </tr>
      {% else %}
      <tr><td colspan="7" class="text-muted">No requests yet.</td></tr>
      {% endfor %}
    </tbody>
  </table>

  <a href="{{ url_for('wallet_routes.wallet_dashboard') }}" class="btn btn-outline-primary">Back</a>
</body>
</html>
