<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Agent Commission History</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container py-4">
  <h2>Commission History for Agent: {{ agent_id }}</h2>

  <table class="table table-bordered">
    <thead><tr><th>Amount</th><th>Source</th><th>Type</th><th>Timestamp</th></tr></thead>
    <tbody>
      {% for entry in history %}
      <tr>
        <td>{{ entry.amount }}</td>
        <td>{{ entry.source }}</td>
        <td>{{ entry.type }}</td>
        <td>{{ entry.timestamp }}</td>
      </tr>
      {% else %}
      <tr><td colspan="4" class="text-muted">No commissions earned yet.</td></tr>
      {% endfor %}
    </tbody>
  </table>

  <a href="/wallet/dashboard" class="btn btn-outline-primary">Back to Wallet</a>
</body>
</html>
