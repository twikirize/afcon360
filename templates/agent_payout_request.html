<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Request Payout</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container py-4">
  <h2>Payout Request for Agent: {{ agent_id }}</h2>
  <p><strong>Available commission:</strong> UGX {{ total | round(2) }}</p>

  <form method="POST" class="mb-4">
    <div class="mb-3">
      <label class="form-label">Amount</label>
      <input type="number" step="0.01" name="amount" class="form-control" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Method</label>
      <select name="method" class="form-select">
        <option value="bank">Bank Transfer</option>
        <option value="mobile_money">Mobile Money</option>
      </select>
    </div>
    <div class="mb-3">
      <label class="form-label">Account Details</label>
      <input type="text" name="account" class="form-control" placeholder="Account number / mobile">
    </div>
    <button class="btn btn-primary">Submit Request</button>
  </form>

  <h5>Your Commission History</h5>
  <table class="table table-sm">
    <thead><tr><th>Amount</th><th>Type</th><th>Source</th><th>Timestamp</th></tr></thead>
    <tbody>
      {% for e in history %}
      <tr>
        <td>{{ e.amount }}</td>
        <td>{{ e.type }}</td>
        <td>{{ e.source }}</td>
        <td>{{ e.timestamp }}</td>
      </tr>
      {% else %}
      <tr><td colspan="4" class="text-muted">No commissions yet.</td></tr>
      {% endfor %}
    </tbody>
  </table>

  <a href="{{ url_for('wallet_routes.wallet_dashboard') }}" class="btn btn-outline-primary">Back</a>
</body>
</html>
