# =============================================================================
# AFCON360 - Docker Compose (Production / Oracle Cloud Always Free)
# Stack: Flask + PostgreSQL + Redis + Celery + Nginx
#
# Usage:
#   cp .env.example .env        # fill in your secrets# =============================================================================
# AFCON360 - Docker Compose (Production / Oracle Cloud Always Free)
# Stack: Flask + PostgreSQL + Redis + Celery + Nginx
#
# Usage:
#   cp .env.example .env        # fill in your secrets
#   docker compose up -d        # start everything
#   docker compose logs -f web  # watch logs
# =============================================================================

version: '3.9'

networks:
  afcon_net:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  app_logs:
    driver: local

services:

  # ---------------------------------------------------------------------------
  # PostgreSQL — database (no exposed ports)
  # ---------------------------------------------------------------------------
  db:
    image: postgres:15-alpine
    container_name: afcon360_db
    restart: unless-stopped
    networks:
      - afcon_net
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${DB_NAME:-afcon360_prod}
      POSTGRES_USER: ${DB_USER:-afcon_user}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-afcon_user} -d ${DB_NAME:-afcon360_prod}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  # ---------------------------------------------------------------------------
  # Redis — session store, cache, Celery broker (no exposed ports)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: afcon360_redis
    restart: unless-stopped
    networks:
      - afcon_net
    volumes:
      - redis_data:/data
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1
      --appendonly yes
      --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.3'

  # ---------------------------------------------------------------------------
  # Flask Web App — Gunicorn (2 workers for free tier)
  # ---------------------------------------------------------------------------
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: afcon360_web
    restart: unless-stopped
    networks:
      - afcon_net
    volumes:
      - app_logs:/app/logs
      - ./static:/app/static:ro
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASS}@db:5432/${DB_NAME}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/1
      FLASK_ENV: production
      SESSION_COOKIE_SECURE: "true"
      CONTAINER_ROLE: web
      GUNICORN_WORKERS: 2
      GUNICORN_THREADS: 2
      GUNICORN_TIMEOUT: 120
    command: gunicorn
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:5000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  # ---------------------------------------------------------------------------
  # Celery Worker — background tasks (2 concurrency for free tier)
  # ---------------------------------------------------------------------------
  celery:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: afcon360_celery
    restart: unless-stopped
    networks:
      - afcon_net
    volumes:
      - app_logs:/app/logs
    env_file:
      - .env
    environment:
      DB_HOST: db
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASS}@db:5432/${DB_NAME}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/1
      FLASK_ENV: production
      CELERY_CONCURRENCY: 2
      CONTAINER_ROLE: celery
    command: celery
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 384M
          cpus: '0.4'

  # ---------------------------------------------------------------------------
  # Celery Beat — scheduled tasks (lightweight)
  # ---------------------------------------------------------------------------
  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: afcon360_celery_beat
    restart: unless-stopped
    networks:
      - afcon_net
    env_file:
      - .env
    environment:
      DB_HOST: db
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASS}@db:5432/${DB_NAME}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      FLASK_ENV: production
      CONTAINER_ROLE: celery-beat
    command: celery-beat
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.1'

  # ---------------------------------------------------------------------------
  # Nginx — reverse proxy (optional, can use Cloudflare instead to save RAM)
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: afcon360_nginx
    restart: unless-stopped
    networks:
      - afcon_net
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/afcon360.conf:/etc/nginx/conf.d/default.conf:ro
      - ./static:/app/static:ro
    depends_on:
      - web
    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://localhost/" ]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.1'
