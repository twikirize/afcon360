#version 3

{% extends "base.html" %}

{% block content %}
<section class="hero">
  <div class="hero-left">
    <h1>🌍 Welcome to AFCON 360</h1>
    <p class="lead">Live fixtures, travel packages, wallet payments and trusted local agents — all in one place.</p>
    <div class="hero-ctas">
      <a class="btn primary" href="{{ url_for('matches.index') }}">View Fixtures</a>
      <a class="btn outline" href="{{ url_for('tourism.index') }}">Explore Tourism</a>
    </div>
  </div>

  <div class="hero-right">
    <div class="highlights">
      {% if matches %}
        <div class="highlight"><strong>Next Match</strong><span>{{ matches[0].team_a }} vs {{ matches[0].team_b }} • {{ matches[0].date }}</span></div>
      {% endif %}
      {% if tourism %}
        <div class="highlight"><strong>Top Package</strong><span>{{ tourism[0].title }} • ${{ tourism[0].price }}</span></div>
      {% endif %}
      {% if adverts %}
        <div class="highlight"><strong>Sponsored</strong><span>{{ adverts[0].title }}</span></div>
      {% endif %}
    </div>
  </div>
</section>

<section class="explore">
  <h2>Explore</h2>
  <div class="tiles">
    <a class="tile" href="{{ url_for('auth.register') }}"><span class="icon">📝</span><strong>Register</strong><small>Create your Fan Profile</small></a>
    <a class="tile" href="{{ url_for('auth.login') }}"><span class="icon">🔐</span><strong>Login</strong><small>Access wallet & bookings</small></a>
    <a class="tile" href="{{ url_for('matches.index') }}"><span class="icon">⚽</span><strong>Match Fixtures</strong><small>Full schedule & tickets</small></a>
    <a class="tile" href="{{ url_for('tourism.index') }}"><span class="icon">🏞️</span><strong>Tourism</strong><small>Curated travel packages</small></a>
    <a class="tile" href="{{ url_for('wallet.home') }}"><span class="icon">💳</span><strong>Wallet</strong><small>Deposits & transfers</small></a>
  </div>
</section>

<section class="strip">
  <div class="strip-inner">
    {% for match in matches %}
      <div class="strip-item">
        <strong>{{ match.team_a }} vs {{ match.team_b }}</strong>
        <span>{{ match.date }} • {{ match.venue }}</span>
      </div>
    {% endfor %}
  </div>
</section>

<section class="modules">
  <div class="module-col">
    <h3>Upcoming Matches</h3>
    <ul class="card-list">
      {% for match in matches %}
        <li class="card">
          <div class="card-body">
            <div class="card-title">{{ match.team_a }} vs {{ match.team_b }}</div>
            <div class="card-meta">{{ match.date }} • {{ match.venue }}</div>
            <div class="card-actions">
              <a class="btn small" href="{{ url_for('matches.index') + '/' + match.match_id }}">Details</a>
              <a class="btn small outline" href="{{ url_for('auth.login') }}?next={{ url_for('matches.index') + '/' + match.match_id }}">Book</a>
            </div>
          </div>
        </li>
      {% endfor %}
    </ul>
  </div>

  <div class="module-col">
    <h3>Tourism Packages</h3>
    <ul class="card-list">
      {% for package in tourism %}
        <li class="card">
          <img class="card-media" src="{{ package.image_url }}" alt="{{ package.title }}">
          <div class="card-body">
            <div class="card-title">{{ package.title }}</div>
            <div class="card-meta">${{ package.price }}</div>
            <p class="card-desc">{{ package.description }}</p>
            <div class="card-actions">
              <a class="btn small" href="{{ url_for('tourism.index') + '/' + package.package_id }}">Explore</a>
              <a class="btn small outline" href="{{ url_for('auth.login') }}?next={{ url_for('tourism.index') + '/' + package.package_id }}">Book</a>
            </div>
          </div>
        </li>
      {% endfor %}
    </ul>
  </div>
</section>

<section class="sponsors">
  <h3>Our Sponsors</h3>
  <div class="sponsor-row">
    {% for ad in adverts %}
      <a class="sponsor" href="{{ url_for('index') + 'ads/' + ad.advert_id }}"><img src="{{ ad.image_url }}" alt="{{ ad.title }}"></a>
    {% endfor %}
  </div>
</section>
{% endblock %}
