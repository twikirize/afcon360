<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Page Not Found - AFCON360</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    .error-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    .error-card {
      background: rgba(255,255,255,0.95);
      border-radius: 1rem;
      padding: 3rem;
      text-align: center;
      max-width: 500px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .error-code {
      font-size: 6rem;
      font-weight: 700;
      color: #dc3545;
      line-height: 1;
    }
    .btn-home {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border: none;
      color: white;
      padding: 0.75rem 2rem;
      border-radius: 2rem;
      text-decoration: none;
      display: inline-block;
      margin-top: 1rem;
    }
    .btn-home:hover {
      opacity: 0.9;
      color: white;
    }
  </style>
</head>
<body>
  <div class="error-container">
    <div class="error-card">
      <div class="error-code">404</div>
      <h2 class="mb-3">Page Not Found</h2>
      <p class="text-muted">The page you're looking for doesn't exist or may have been moved.</p>
      <a href="/" class="btn-home"><i class="fas fa-home me-2"></i>Go Home</a>
      <button onclick="history.back()" class="btn btn-outline-secondary rounded-pill ms-2 mt-3"><i class="fas fa-arrow-left me-2"></i>Go Back</button>
    </div>
  </div>
</body>
</html>
